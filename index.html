<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Duel</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
</head>

<body>
    <main class="app">
      <header class="hero">
        <div class="title-wrap">
          <span class="eyebrow">Dice Duel</span>
          <h1>Draw!</h1>
          <p class="sub">Click play to roll. Highest number wins.</p>
        </div>
      </header>

      <div class="container">

        <div class="dice-card">
          <p class="label">Player 1</p>
          <img id="dice1" src="./one.jpg" alt="Player 1 dice">
        </div>

        <div class="dice-card">
          <p class="label">Player 2</p>
          <img id="dice2" src="./two.jpg" alt="Player 2 dice">
        </div>

      </div>

      <button id="newGame" class="cta">Play</button>
    </main>

    <script src="script.js"></script>
</body>

</html>
